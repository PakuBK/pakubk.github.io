<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pakus-web-corner</title>
    <link href="./css/output.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="bg-slate-200">
      <h1
        class="text-3xl px-2 py-4 border-b border-black font-bold tracking-widest"
      >
        pakus web corner
      </h1>
    </header>
    <main class="h-full grid grid-cols-[auto_1fr]">
      <section class="border-r border-black">
        <span
          class="text-2xl mb-2 border-b border-black p-3 flex flex-row justify-between"
        >
          <p>✉︎</p>
          <h2 class="tracking-widest">nachrichten</h2>
          <p>✉︎</p>
        </span>
        <div class="grid grid-cols-1 gap-6 pl-2 pr-3 pt-2">
          <table class="min-w-[300px] shadow-primary">
            <thead>
              <tr>
                <th align="left" class="px-2 w-[300px]">working...</th>
                <th align="center" class="text-dimmed text-nowrap bg-slate-200">
                  3 März, 2026
                </th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td align="left" colspan="2" class="px-2 py-1">another week</td>
              </tr>
            </tbody>
            <tfoot>
              <td align="center" colspan="2" class="px-2 bg-slate-200">
                mood: (╥﹏╥)
              </td>
            </tfoot>
          </table>
          <table class="max-w-[600px] shadow-primary">
            <thead>
              <tr>
                <th align="left" class="px-2 w-[300px]">create my new space</th>
                <th align="center" class="text-dimmed text-nowrap bg-slate-200">
                  2 Oktober, 2025
                </th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td align="left" colspan="2" class="px-2 py-1">
                  today i started with the development of my new site
                </td>
              </tr>
            </tbody>
            <tfoot>
              <td align="center" colspan="2" class="px-2 bg-slate-200">
                mood: ୧(▲ᴗ▲)ノ
              </td>
            </tfoot>
          </table>
        </div>
      </section>
      <section class="">
        <span
          class="text-2xl mb-2 border-b border-black p-3 flex flex-row justify-between"
        >
          <p>☭</p>
          <h2 class="tracking-widest">fundkiste</h2>
          <p>♯</p>
        </span>
        <div class="grid grid-cols-2 px-3 gap-8">
          <article class="flex flex-row gap-4">
            <img
              src="./777.png"
              width="100px"
              height="100px"
              class="shadow-primary"
            />
            <div
              class="h-full w-full flex flex-col shadow-primary border border-black"
            >
              <h4 class="p-2">kunst in pixel und so...</h4>
              <a
                class="w-full bg-slate-100 mt-auto border-t border-black text-center"
                href="./pixelart.html"
                >link</a
              >
            </div>
          </article>

          <article class="flex flex-row gap-4">
            <div
              class="h-full w-full flex flex-col shadow-primary border border-black"
            >
              <h4 class="p-2">das grundgesetz - von garam salami</h4>
              <a
                class="w-full bg-slate-100 mt-auto border-t border-black text-center"
                href="https://salamithought.noblogs.org/post/2025/09/29/ist-das-grundgesetz-antifaschistisch/"
                >link</a
              >
            </div>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
